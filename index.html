<!DOCTYPE html>
<html>
<head>
  <title>Scoreladder Mail</title>
  <style>
    body { margin: 0; font-family: Arial; display: flex; height: 100vh; }

    #sidebar {
      width: 220px;
      border-right: 1px solid #ddd;
      padding: 10px;
    }

    #main {
      flex: 1;
      padding: 10px;
      position: relative;
    }

    .email {
      padding: 10px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    .email:hover { background: #f5f5f5; }

    input, textarea {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
    }

    /* COMPOSE POPUP */
    #compose {
      display: none;
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: 400px;
      height: 420px;
      background: white;
      border: 1px solid #ccc;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      padding: 10px;
      z-index: 999;
    }

    #composeHeader {
      display: flex;
      justify-content: space-between;
      font-weight: bold;
      margin-bottom: 10px;
    }

    #emailView {
      margin-top: 10px;
      padding: 10px;
      border: 1px solid #ddd;
      background: #fff;
    }
  </style>
</head>

<body>

<div id="sidebar">
  <h3>Scoreladder Mail</h3>

  <button onclick="loadInbox()">Inbox</button>
  <button onclick="openCompose()">Compose</button>

  <br/><br/>

  <select id="from">
    <option value="input@mail.scoreladder.org">input@mail.scoreladder.org</option>
    <option value="support@mail.scoreladder.org">support@mail.scoreladder.org</option>
    <option value="bot@mail.scoreladder.org">bot@mail.scoreladder.org</option>
  </select>
</div>

<div id="main">
  <h3>Inbox</h3>
  <div id="emails"></div>

  <!-- EMAIL VIEW PANEL (DO NOT DELETE THIS) -->
  <div id="emailView"></div>
</div>

<!-- COMPOSE POPUP -->
<div id="compose">
  <div id="composeHeader">
    <span>New Message</span>
    <button onclick="closeCompose()">X</button>
  </div>

  <input id="to" placeholder="To" />
  <input id="subject" placeholder="Subject" />
  <textarea id="body" rows="10" placeholder="Message"></textarea>

  <button onclick="sendEmail()">Send</button>
</div>

<script>
const API = "https://mail-api.scoreladder.org";

/* ================= INBOX ================= */
async function loadInbox() {
  const res = await fetch(`${API}/api/inbox?user=support`);
  const data = await res.json();

  const box = document.getElementById("emails");
  if (!box) return;

  box.innerHTML = "";

  data.forEach(e => {
    const div = document.createElement("div");
    div.className = "email";
    div.innerHTML = `<b>${e.from_addr}</b><br>${e.subject}`;
    div.onclick = () => openEmail(e.id);
    box.appendChild(div);
  });
}

/* ================= OPEN EMAIL ================= */
async function openEmail(id) {
  const res = await fetch(`${API}/api/email?id=${id}`);
  const e = await res.json();

  const view = document.getElementById("emailView");
  if (!view) return;

  view.innerHTML = `
    <h3>${e.subject}</h3>
    <p><b>From:</b> ${e.from_addr}</p>
    <pre>${e.body_text}</pre>
  `;

  await fetch(`${API}/api/read`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ id })
  });
}

/* ================= COMPOSE (POPUP) ================= */
function openCompose() {
  document.getElementById("compose").style.display = "block";
}

function closeCompose() {
  document.getElementById("compose").style.display = "none";
}

/* ================= SEND EMAIL ================= */
async function sendEmail() {
  const from = document.getElementById("from").value;
  const to = document.getElementById("to").value;
  const subject = document.getElementById("subject").value;
  const body = document.getElementById("body").value;

  const res = await fetch(`${API}/api/send`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ from, to, subject, body })
  });

  const text = await res.text();
  console.log(text);

  closeCompose();
  loadInbox();

  alert("Sent!");
}

loadInbox();
</script>

</body>
</html>
