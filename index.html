<!DOCTYPE html>
<html>
<head>
  <title>Scoreladder Mail</title>
  <style>
    body { margin: 0; font-family: Arial; display: flex; height: 100vh; }

    #sidebar {
      width: 220px;
      border-right: 1px solid #ddd;
      padding: 10px;
    }

    #main {
      flex: 1;
      padding: 10px;
    }

    .email {
      padding: 10px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    .email:hover { background: #f5f5f5; }

    input, textarea {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
    }
  </style>
</head>

<body>

<div id="sidebar">
  <h3>Scoreladder Mail</h3>

  <button onclick="loadInbox()">Inbox</button>
  <button onclick="showCompose()">Compose</button>

  <br/><br/>

  <select id="from">
    <option value="input@scoreladder.org">input@scoreladder.org</option>
    <option value="support@scoreladder.org">support@scoreladder.org</option>
    <option value="bot@scoreladder.org">bot@scoreladder.org</option>
  </select>
</div>

<div id="main">
  <h3>Inbox</h3>
  <div id="emails"></div>
</div>

<script>
const API = "https://mail-api.scoreladder.org";

async function loadInbox() {
  const res = await fetch(`${API}/api/inbox?user=support`);
  const data = await res.json();

  const box = document.getElementById("emails");
  box.innerHTML = "";

  data.forEach(e => {
    const div = document.createElement("div");
    div.className = "email";
    div.innerHTML = `<b>${e.from_addr}</b><br>${e.subject}`;
    div.onclick = () => openEmail(e.id);
    box.appendChild(div);
  });
}

async function openEmail(id) {
  const res = await fetch(`${API}/api/email?id=${id}`);
  const e = await res.json();

  document.getElementById("main").innerHTML = `
    <h3>${e.subject}</h3>
    <p><b>From:</b> ${e.from_addr}</p>
    <pre>${e.body_text}</pre>
  `;

  await fetch(`${API}/api/read`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ id })
  });
}

function showCompose() {
  document.getElementById("main").innerHTML = `
    <h3>Compose</h3>

    <input id="to" placeholder="To" />
    <input id="subject" placeholder="Subject" />
    <textarea id="body" rows="10"></textarea>

    <button onclick="sendEmail()">Send</button>
  `;
}

async function sendEmail() {
  const from = document.getElementById("from").value;

  const res = await fetch(`${API}/api/send`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      from,
      to: document.getElementById("to").value,
      subject: document.getElementById("subject").value,
      body: document.getElementById("body").value
    })
  });

    const text = await res.text();
    console.log(text);

    alert("Sent!");
}

loadInbox();
</script>

</body>
</html>
