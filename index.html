<!DOCTYPE html>
<html>
<head>
  <title>Scoreladder Mail</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* SIDEBAR */
    #sidebar {
      width: 220px;
      border-right: 1px solid #ddd;
      padding: 10px;
      background: #f8f8f8;
    }

    #sidebar button {
      width: 100%;
      margin: 5px 0;
      padding: 8px;
      cursor: pointer;
    }

    #from {
      width: 100%;
      margin-top: 10px;
    }

    /* EMAIL LIST */
    #listPane {
      width: 35%;
      border-right: 1px solid #ddd;
      overflow-y: auto;
    }

    .email {
      padding: 12px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    .email:hover {
      background: #f1f1f1;
    }

    /* VIEWER */
    #viewPane {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
    }

    /* COMPOSE POPUP */
    #compose {
      display: none;
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: 420px;
      height: 450px;
      background: white;
      border: 1px solid #ccc;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      z-index: 999;
      display: flex;
      flex-direction: column;
    }

    #composeHeader {
      background: #222;
      color: white;
      padding: 8px;
      display: flex;
      justify-content: space-between;
    }

    #composeBody {
      padding: 10px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    #composeBody input,
    #composeBody textarea {
      margin-bottom: 10px;
      padding: 8px;
    }

    #composeBody textarea {
      flex: 1;
      resize: none;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <h3>Mail</h3>

  <button onclick="loadInbox()">Inbox</button>
  <button onclick="openCompose()">Compose</button>

  <select id="from">
    <option value="input@mail.scoreladder.org">input@mail.scoreladder.org</option>
    <option value="support@mail.scoreladder.org">support@mail.scoreladder.org</option>
    <option value="bot@mail.scoreladder.org">bot@mail.scoreladder.org</option>
  </select>
</div>

<!-- EMAIL LIST -->
<div id="listPane">
  <div id="emails"></div>
</div>

<!-- VIEWER -->
<div id="viewPane">
  <h3>Welcome</h3>
  <p>Select an email to view it.</p>
</div>

<!-- COMPOSE -->
<div id="compose">
  <div id="composeHeader">
    <span>New Message</span>
    <button onclick="closeCompose()">X</button>
  </div>

  <div id="composeBody">
    <input id="to" placeholder="To" />
    <input id="subject" placeholder="Subject" />
    <textarea id="body" placeholder="Message"></textarea>

    <button onclick="sendEmail()">Send</button>
  </div>
</div>

<script>
const API = "https://mail-api.scoreladder.org";

/* ================= INBOX ================= */
async function loadInbox() {
  const res = await fetch(`${API}/api/inbox?user=support`);
  const data = await res.json();

  const box = document.getElementById("emails");
  box.innerHTML = "";

  data.forEach(e => {
    const div = document.createElement("div");
    div.className = "email";
    div.innerHTML = `<b>${e.from_addr}</b><br>${e.subject}`;
    div.onclick = () => openEmail(e.id);
    box.appendChild(div);
  });
}

/* ================= VIEW EMAIL ================= */
async function openEmail(id) {
  const res = await fetch(`${API}/api/email?id=${id}`);
  const e = await res.json();

  document.getElementById("viewPane").innerHTML = `
    <h2>${e.subject}</h2>
    <p><b>From:</b> ${e.from_addr}</p>
    <hr>
    <pre style="white-space: pre-wrap">${e.body_text}</pre>
  `;

  await fetch(`${API}/api/read`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ id })
  });
}

/* ================= COMPOSE ================= */
function openCompose() {
  document.getElementById("compose").style.display = "flex";
}

function closeCompose() {
  document.getElementById("compose").style.display = "none";
}

/* ================= SEND ================= */
async function sendEmail() {
  const from = document.getElementById("from").value;

  const res = await fetch(`${API}/api/send`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      from,
      to: document.getElementById("to").value,
      subject: document.getElementById("subject").value,
      body: document.getElementById("body").value
    })
  });

  closeCompose();
  loadInbox();
  console.log(res)
  alert("Sent!");
}

loadInbox();
</script>

</body>
</html>
